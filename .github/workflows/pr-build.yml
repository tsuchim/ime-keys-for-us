name: PR Build

on:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install WiX
        run: dotnet tool install --global wix --version 4.0.6

      - name: Release preflight
        shell: pwsh
        run: scripts/Test-ReleasePreflight.ps1 -BuildDir build -Generator "Visual Studio 17 2022" -Architecture x64 -IncludeInstallerSmoke

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ime-keys-for-us-unsigned-x64
          path: build/**/Release/ime-keys-for-us.exe

      - name: Upload installer if built
        uses: actions/upload-artifact@v4
        with:
          name: ime-keys-for-us-installer-unsigned-x64
          path: build/IME-Keys-for-US-*-x64-unsigned.msi
          if-no-files-found: ignore
