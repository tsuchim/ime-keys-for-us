name: PR Build

on:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ime-keys-for-us-unsigned-x64
          path: build/**/Release/ime-keys-for-us.exe

      - name: Try building installer when WiX is available
        shell: pwsh
        run: |
          $wix = Get-Command wix -ErrorAction SilentlyContinue
          if (-not $wix) {
            Write-Host "WiX is not available; skipping installer build."
            exit 0
          }
          $exe = Get-ChildItem build -Recurse -Filter ime-keys-for-us.exe | Select-Object -First 1
          if (-not $exe) {
            throw "Executable not found."
          }
          wix build installer/wix/Product.wxs -d SourceDir=$($exe.Directory.FullName) -o IME-Keys-for-US-0.1.0-x64-unsigned.msi

      - name: Upload installer if built
        uses: actions/upload-artifact@v4
        with:
          name: ime-keys-for-us-installer-unsigned-x64
          path: IME-Keys-for-US-0.1.0-x64-unsigned.msi
          if-no-files-found: ignore

