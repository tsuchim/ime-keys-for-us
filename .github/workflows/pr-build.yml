name: PR Build

on:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Resolve project version
        shell: pwsh
        run: |
          $cmakeLists = Get-Content CMakeLists.txt -Raw
          if ($cmakeLists -notmatch 'project\(ImeKeysForUS VERSION ([0-9]+\.[0-9]+\.[0-9]+)') {
            throw "Could not resolve project version from CMakeLists.txt."
          }
          "PROJECT_VERSION=$($Matches[1])" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ime-keys-for-us-unsigned-x64
          path: build/**/Release/ime-keys-for-us.exe

      - name: Install WiX
        run: dotnet tool install --global wix --version 4.0.6

      - name: Build installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem build -Recurse -Filter ime-keys-for-us.exe | Select-Object -First 1
          if (-not $exe) {
            throw "Executable not found."
          }
          wix build installer/wix/Product.wxs -d SourceDir=$($exe.Directory.FullName) -o "IME-Keys-for-US-$env:PROJECT_VERSION-x64-unsigned.msi"

      - name: Upload installer if built
        uses: actions/upload-artifact@v4
        with:
          name: ime-keys-for-us-installer-unsigned-x64
          path: IME-Keys-for-US-*-x64-unsigned.msi
          if-no-files-found: ignore
